<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Tracker">
<title>Poker Tournament Tracker 2026</title>
<style>
  :root {
    --wsop:     #ffffff;
    --wsop-sat: #f2f2f2;
    --venetian: #d0edcf;
    --ven-sat:  #e5f5e4;
    --wynn:     #ffedaa;
    --wynn-sat: #fff5cc;
    --wsopc:    #d6eaf8;
    --wsopc-sat:#eaf4fb;
    --aria:     #f5e6f8;
    --aria-sat: #faf0fc;
    --plo:      #ffe0c0;
    --navy:     #1a3a5c;
    --green:    #2d6a2d;
    --red:      #8b0000;
    --bg:       #f0f4f8;
    --card:     #ffffff;
    --border:   #dde3ea;
    --text:     #1a1a2e;
    --muted:    #6b7a8d;
    --radius:   14px;
    --shadow:   0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    color: white;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header p  { font-size: 12px; opacity: 0.65; margin-top: 2px; }

  /* ── Totals bar ── */
  #totals-bar {
    background: var(--navy);
    padding: 0 20px 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .total-pill {
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: white;
    font-weight: 600;
  }
  .total-pill span { opacity: 0.7; font-weight: 400; margin-right: 4px; }
  .total-pill.profit { background: rgba(100,200,100,0.25); }
  .total-pill.loss   { background: rgba(220,80,80,0.25); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 82px;
    z-index: 90;
  }
  .tab {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--navy);
    border-bottom-color: var(--navy);
  }

  /* ── Panels ── */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  /* ── Form ── */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px; /* prevents iOS zoom */
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--navy); }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }

  /* Total Spent display */
  .total-display {
    background: #dff0d8;
    border: 1.5px solid #a8d5a2;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    text-align: center;
    letter-spacing: -0.5px;
  }

  /* ── Buttons ── */
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.2px;
  }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn-primary { background: var(--navy); color: white; }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    font-size: 14px;
    padding: 12px;
    margin-top: 8px;
  }
  .btn-export {
    background: #2d6a2d;
    color: white;
    font-size: 14px;
    padding: 12px;
    margin-top: 0;
  }

  /* ── History list ── */
  .entry-card {
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 5px solid transparent;
    position: relative;
  }
  .entry-card.WSOP     { background: var(--wsop);     border-left-color: #aaa; }
  .entry-card.Venetian { background: var(--venetian); border-left-color: #5a9a5a; }
  .entry-card.Wynn     { background: var(--wynn);     border-left-color: #c8a800; }
  .entry-card.WSOPC    { background: var(--wsopc);    border-left-color: #2471a3; }
  .entry-card.ARIA     { background: var(--aria);     border-left-color: #8e44ad; }
  .entry-card.sat      { opacity: 0.85; }
  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }
  .entry-name { font-size: 15px; font-weight: 600; flex: 1; padding-right: 10px; line-height: 1.3; }
  .entry-spent { font-size: 17px; font-weight: 700; color: var(--navy); white-space: nowrap; }
  .entry-meta  { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(26,58,92,0.1);
    color: var(--navy);
  }
  .entry-net-positive { color: var(--green); font-weight: 700; }
  .entry-net-negative { color: var(--red);   font-weight: 700; }

  .delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: #ccc;
    padding: 4px;
    line-height: 1;
  }
  .delete-btn:active { color: var(--red); }

  /* ── Summary ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-box .stat-val {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.5px;
  }
  .stat-box .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .stat-box.profit .stat-val { color: var(--green); }
  .stat-box.loss   .stat-val { color: var(--red); }

  .loc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .loc-row:last-child { border-bottom: none; }
  .loc-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 15px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a2e;
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🃏 Poker Tournament Tracker</h1>
  <p>2026 Las Vegas Series · WSOPC Commerce · ARIA</p>
</header>

<div id="totals-bar">
  <div class="total-pill"><span>Entries</span><span id="t-count">0</span></div>
  <div class="total-pill"><span>Spent</span><span id="t-spent">$0</span></div>
  <div class="total-pill" id="t-net-pill"><span>Net</span><span id="t-net">—</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('add')">➕ Add Entry</div>
  <div class="tab" onclick="switchTab('history')">📋 History</div>
  <div class="tab" onclick="switchTab('summary')">📊 Summary</div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- ADD ENTRY TAB                          -->
<!-- ══════════════════════════════════════ -->
<div class="panel active" id="panel-add">
  <div class="card">
    <div class="card-title">Tournament Info</div>

    <div class="row-2">
      <div class="field">
        <label>Date</label>
        <input type="date" id="f-date" onchange="onDateChange()">
      </div>
      <div class="field">
        <label>Location</label>
        <select id="f-loc">
          <option>WSOP</option>
          <option>Venetian</option>
          <option>Wynn</option>
          <option>WSOPC</option>
          <option>ARIA</option>
        </select>
      </div>
    </div>

    <!-- Event Picker — appears when selected date has scheduled events -->
    <div id="event-picker-wrap" style="display:none; margin-bottom:4px;">
      <div class="field" style="margin-bottom:4px">
        <label>Pick from Schedule</label>
        <select id="event-select" onchange="onEventPick()"
          style="font-size:15px; padding:12px 14px; width:100%;
                 border:2px solid var(--navy); border-radius:10px;
                 background:#f0f6ff; color:var(--navy); font-weight:600;
                 -webkit-appearance:none;">
          <option value="">— browse &amp; pick an event —</option>
        </select>
      </div>
      <div id="gtd-info"   style="display:none; font-size:12px; color:#2d6a2d; font-weight:600; padding:2px 6px 4px;"></div>
      <div id="feeds-info" style="display:none; font-size:12px; color:#7a5a00; font-weight:600; padding:2px 6px 6px;"></div>
    </div>

    <div class="row-2">
      <div class="field">
        <label>Event #</label>
        <input type="text" id="f-evnum" placeholder="e.g. #82">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="f-type">
          <option>Tournament</option>
          <option>Satellite</option>
          <option>Double Board PLO</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Event Name</label>
      <input type="text" id="f-name" placeholder="e.g. No-Limit Hold'em Main Event">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Buy-In</div>

    <div class="row-2">
      <div class="field">
        <label>Buy-In ($)</label>
        <input type="number" id="f-buyin" placeholder="0" inputmode="decimal" min="0" step="any" oninput="calcTotal()">
      </div>
      <div class="field">
        <label>Re-Entries</label>
        <input type="number" id="f-reentries" placeholder="0" inputmode="numeric" min="0" value="0" oninput="calcTotal()">
      </div>
    </div>

    <div class="field">
      <label>Total Spent</label>
      <div class="total-display" id="total-display">$0.00</div>
    </div>

    <div class="field">
      <label>Result ($) &nbsp;<span style="font-weight:400;text-transform:none">— fill in when you cash</span></label>
      <input type="number" id="f-result" placeholder="leave blank if not cashed" inputmode="decimal" min="0" step="any">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Notes (optional)</div>
    <div class="field" style="margin-bottom:0">
      <textarea id="f-notes" rows="2" placeholder="Table #, bounties, anything notable…"
        style="resize:none; font-size:16px;"></textarea>
    </div>
  </div>

  <button class="btn btn-primary" onclick="saveEntry()">💾 &nbsp;Save Entry</button>
  <button class="btn btn-secondary" onclick="clearForm()">Clear Form</button>
</div>

<!-- ══════════════════════════════════════ -->
<!-- HISTORY TAB                            -->
<!-- ══════════════════════════════════════ -->
<div class="panel" id="panel-history">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <div style="font-size:13px; color:var(--muted); font-weight:600;">
      <span id="hist-count">0</span> entries — newest first
    </div>
    <button class="btn btn-export" style="width:auto; padding:8px 14px;"
            onclick="exportCSV()">⬇ Export CSV</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- ══════════════════════════════════════ -->
<!-- SUMMARY TAB                            -->
<!-- ══════════════════════════════════════ -->
<div class="panel" id="panel-summary">
  <div class="card">
    <div class="card-title">Overall</div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-val" id="s-entries">0</div>
        <div class="stat-lbl">Entries</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="s-spent">$0</div>
        <div class="stat-lbl">Total Spent</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="s-result">$0</div>
        <div class="stat-lbl">Total Cashed</div>
      </div>
      <div class="stat-box" id="s-net-box">
        <div class="stat-val" id="s-net">—</div>
        <div class="stat-lbl">Net P/L</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-val" id="s-cashes">0</div>
        <div class="stat-lbl">Cashes</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="s-roi">—</div>
        <div class="stat-lbl">ROI</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">By Location</div>
    <div id="summary-loc"></div>
  </div>

  <div class="card">
    <div class="card-title">By Type</div>
    <div id="summary-type"></div>
  </div>

  <button class="btn btn-export" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<div id="toast"></div>

<script>
// ── Storage ──────────────────────────────────────
const KEY = "poker_tracker_2026";

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; }
}
function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

// ── Helpers ──────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined || n === "") return "—";
  return "$" + parseFloat(n).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtShort(n) {
  if (n === null || n === undefined || n === "") return "—";
  const v = Math.abs(parseFloat(n));
  if (v >= 1000) return "$" + (v/1000).toFixed(1) + "k";
  return "$" + v.toFixed(0);
}
function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ── Tabs ─────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["add","history","summary"][i] === name);
  });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  if (name === "history")  renderHistory();
  if (name === "summary")  renderSummary();
}

// ── Form logic ────────────────────────────────────
function calcTotal() {
  const buyin = parseFloat(document.getElementById("f-buyin").value) || 0;
  const re    = parseInt(document.getElementById("f-reentries").value) || 0;
  const total = buyin * (1 + re);
  document.getElementById("total-display").textContent = fmt(total);
}

function clearForm() {
  document.getElementById("f-date").value      = today();
  document.getElementById("f-loc").value       = "WSOP";
  document.getElementById("f-evnum").value     = "";
  document.getElementById("f-type").value      = "Tournament";
  document.getElementById("f-name").value      = "";
  document.getElementById("f-buyin").value     = "";
  document.getElementById("f-reentries").value = "0";
  document.getElementById("f-result").value    = "";
  document.getElementById("f-notes").value     = "";
  document.getElementById("total-display").textContent = "$0.00";
}

function saveEntry() {
  const name  = document.getElementById("f-name").value.trim();
  const buyin = parseFloat(document.getElementById("f-buyin").value);

  if (!name)         { showToast("⚠️ Please enter the event name"); return; }
  if (isNaN(buyin))  { showToast("⚠️ Please enter the buy-in amount"); return; }

  const re     = parseInt(document.getElementById("f-reentries").value) || 0;
  const total  = buyin * (1 + re);
  const result = document.getElementById("f-result").value.trim();

  const entry = {
    id:       Date.now(),
    date:     document.getElementById("f-date").value || today(),
    loc:      document.getElementById("f-loc").value,
    evnum:    document.getElementById("f-evnum").value.trim(),
    type:     document.getElementById("f-type").value,
    name:     name,
    buyin:    buyin,
    reentries:re,
    total:    total,
    result:   result !== "" ? parseFloat(result) : null,
    net:      result !== "" ? parseFloat(result) - total : null,
    notes:    document.getElementById("f-notes").value.trim(),
  };

  const data = load();
  data.push(entry);
  save(data);
  updateTotalsBar();
  showToast("✅ Entry saved!");
  clearForm();
}

function deleteEntry(id) {
  if (!confirm("Delete this entry?")) return;
  const data = load().filter(e => e.id !== id);
  save(data);
  updateTotalsBar();
  renderHistory();
  renderSummary();
}

// ── Totals bar ────────────────────────────────────
function updateTotalsBar() {
  const data   = load();
  const spent  = data.reduce((s,e) => s + (e.total||0), 0);
  const result = data.reduce((s,e) => s + (e.result||0), 0);
  const net    = data.reduce((s,e) => s + (e.net||0), 0);

  document.getElementById("t-count").textContent = data.length;
  document.getElementById("t-spent").textContent = fmtShort(spent);

  const hasNet = data.some(e => e.net !== null);
  const pill   = document.getElementById("t-net-pill");
  document.getElementById("t-net").textContent = hasNet ? (net >= 0 ? "+" : "") + fmtShort(net) : "—";
  pill.className = "total-pill" + (hasNet ? (net >= 0 ? " profit" : " loss") : "");
}

// ── History ───────────────────────────────────────
function renderHistory() {
  const data = [...load()].reverse();
  const el   = document.getElementById("history-list");
  document.getElementById("hist-count").textContent = data.length;

  if (!data.length) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">🃏</div><p>No entries yet.<br>Add your first buy-in!</p></div>`;
    return;
  }

  el.innerHTML = data.map(e => {
    const netHtml = e.net !== null
      ? `<span class="${e.net >= 0 ? "entry-net-positive" : "entry-net-negative"}">
           Net: ${e.net >= 0 ? "+" : ""}${fmt(e.net)}
         </span>`
      : "";
    const resultHtml = e.result !== null ? `Result: ${fmt(e.result)}  ` : "";
    const reHtml = e.reentries > 0 ? `${e.reentries} re-entr${e.reentries>1?"ies":"y"}  ` : "";
    const notesHtml = e.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:5px;font-style:italic">${e.notes}</div>` : "";
    return `
    <div class="entry-card ${e.loc} ${e.type==="Satellite"?"sat":""}">
      <button class="delete-btn" onclick="deleteEntry(${e.id})" title="Delete">✕</button>
      <div class="entry-top">
        <div class="entry-name">${e.name}</div>
        <div class="entry-spent">${fmt(e.total)}</div>
      </div>
      <div class="entry-meta">
        <span>${e.date}</span>
        <span class="badge">${e.loc}</span>
        <span class="badge">${e.type}</span>
        ${e.evnum ? `<span>#${e.evnum}</span>` : ""}
        ${reHtml}
        ${resultHtml}
        ${netHtml}
      </div>
      ${notesHtml}
    </div>`;
  }).join("");
}

// ── Summary ───────────────────────────────────────
function renderSummary() {
  const data = load();
  const spent  = data.reduce((s,e) => s + (e.total||0), 0);
  const result = data.reduce((s,e) => s + (e.result||0), 0);
  const net    = data.reduce((s,e) => s + (e.net||0), 0);
  const cashes = data.filter(e => e.net !== null && e.result > 0).length;
  const hasNet = data.some(e => e.net !== null);
  const roi    = hasNet && spent > 0 ? ((net / spent) * 100).toFixed(1) + "%" : "—";

  document.getElementById("s-entries").textContent = data.length;
  document.getElementById("s-spent").textContent   = fmt(spent);
  document.getElementById("s-result").textContent  = result > 0 ? fmt(result) : "—";
  document.getElementById("s-cashes").textContent  = cashes;
  document.getElementById("s-roi").textContent     = roi;

  const netBox = document.getElementById("s-net-box");
  document.getElementById("s-net").textContent = hasNet ? (net >= 0 ? "+" : "") + fmt(net) : "—";
  netBox.className = "stat-box" + (hasNet ? (net >= 0 ? " profit" : " loss") : "");

  // By location
  const locs = ["WSOP","Venetian","Wynn","WSOPC","ARIA"];
  const locColors = { WSOP:"#aaa", Venetian:"#5a9a5a", Wynn:"#c8a800", WSOPC:"#2471a3", ARIA:"#8e44ad" };
  const byLoc = {};
  locs.forEach(l => byLoc[l] = {count:0, spent:0, result:0, net:0, hasNet:false});
  data.forEach(e => {
    if (!byLoc[e.loc]) return;
    byLoc[e.loc].count++;
    byLoc[e.loc].spent += e.total||0;
    if (e.net !== null) {
      byLoc[e.loc].result += e.result||0;
      byLoc[e.loc].net    += e.net;
      byLoc[e.loc].hasNet  = true;
    }
  });
  document.getElementById("summary-loc").innerHTML = locs
    .filter(l => byLoc[l].count > 0)
    .map(l => {
      const d = byLoc[l];
      const netStr = d.hasNet
        ? `<span class="${d.net>=0?"entry-net-positive":"entry-net-negative"}">${d.net>=0?"+":""}${fmt(d.net)}</span>`
        : `<span style="color:var(--muted)">—</span>`;
      return `<div class="loc-row">
        <div><span class="loc-dot" style="background:${locColors[l]}"></span><strong>${l}</strong>
          <span style="color:var(--muted);font-size:12px"> · ${d.count} entr${d.count>1?"ies":"y"}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:600">${fmt(d.spent)}</div>
          <div style="font-size:12px">${netStr}</div>
        </div>
      </div>`;
    }).join("") || `<div style="color:var(--muted);font-size:14px;padding:10px 0">No data yet</div>`;

  // By type
  const types = ["Tournament","Satellite","Double Board PLO"];
  const byType = {};
  types.forEach(t => byType[t] = {count:0, spent:0});
  data.forEach(e => {
    if (!byType[e.type]) byType[e.type] = {count:0, spent:0};
    byType[e.type].count++;
    byType[e.type].spent += e.total||0;
  });
  document.getElementById("summary-type").innerHTML = Object.entries(byType)
    .filter(([,d]) => d.count > 0)
    .map(([t,d]) => `<div class="loc-row">
        <div><strong>${t}</strong>
          <span style="color:var(--muted);font-size:12px"> · ${d.count} entr${d.count>1?"ies":"y"}</span>
        </div>
        <div style="font-weight:600">${fmt(d.spent)}</div>
      </div>`
    ).join("") || `<div style="color:var(--muted);font-size:14px;padding:10px 0">No data yet</div>`;
}

// ── Export CSV ────────────────────────────────────
function exportCSV() {
  const data = load();
  if (!data.length) { showToast("No data to export"); return; }
  const header = "Date,Location,Event #,Type,Event Name,Buy-In,Re-Entries,Total Spent,Result,Net,Notes";
  const rows = data.map(e => [
    e.date, e.loc, e.evnum, e.type,
    `"${e.name.replace(/"/g,'""')}"`,
    e.buyin, e.reentries, e.total,
    e.result ?? "", e.net ?? "",
    `"${(e.notes||"").replace(/"/g,'""')}"`
  ].join(","));
  const csv  = [header, ...rows].join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "poker_tracker_2026.csv";
  a.click();
  URL.revokeObjectURL(url);
  showToast("📥 CSV downloaded!");
}

// ── Toast ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}

// ── Event Picker ─────────────────────────────────
function getEventsForDate(dateStr) {
  return SCHEDULE.filter(e => e.date === dateStr);
}

function onDateChange() {
  const dateStr = document.getElementById("f-date").value;
  const events  = getEventsForDate(dateStr);
  const picker  = document.getElementById("event-picker");
  const pickerWrap = document.getElementById("event-picker-wrap");
  const sel     = document.getElementById("event-select");

  // Clear old options
  sel.innerHTML = '<option value="">— browse & pick an event —</option>';

  if (events.length === 0) {
    pickerWrap.style.display = "none";
    return;
  }

  pickerWrap.style.display = "block";
  events.forEach((e, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    const buyin = e.buyin ? " · $" + e.buyin.toLocaleString() : "";
    const evnum = e.evnum ? " #" + e.evnum : "";
    const sat   = e.type === "Satellite" ? " [SAT]" : (e.type === "Double Board PLO" ? " [PLO]" : "");
    opt.textContent = e.time + "  " + e.loc + sat + evnum + buyin + "  —  " + e.name;
    opt.dataset.idx = i;
    sel.appendChild(opt);
  });
}

function onEventPick() {
  const sel   = document.getElementById("event-select");
  const idx   = sel.value;
  if (idx === "") return;
  const dateStr = document.getElementById("f-date").value;
  const events  = getEventsForDate(dateStr);
  const ev      = events[parseInt(idx)];
  if (!ev) return;

  document.getElementById("f-loc").value   = ev.loc;
  document.getElementById("f-evnum").value = ev.evnum || "";
  document.getElementById("f-type").value  = ev.type;
  document.getElementById("f-name").value  = ev.name;
  if (ev.buyin) {
    document.getElementById("f-buyin").value = ev.buyin;
    calcTotal();
  }
  // Show feeds-into if satellite
  const feedsEl = document.getElementById("feeds-info");
  if (ev.feeds) {
    feedsEl.textContent = "Feeds into: " + ev.feeds;
    feedsEl.style.display = "block";
  } else {
    feedsEl.style.display = "none";
  }
  // Show GTD if present
  const gtdEl = document.getElementById("gtd-info");
  if (ev.gtd) {
    gtdEl.textContent = "Guarantee: " + ev.gtd;
    gtdEl.style.display = "block";
  } else {
    gtdEl.style.display = "none";
  }
}

// ── Init ──────────────────────────────────────────
document.getElementById("f-date").value = today();
onDateChange();
updateTotalsBar();
</script>
